<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experiment 3: Generative Visuals</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    [data-theme="light"] {
      --bg: #f5f5f5;
      --bg-surface: #fff;
      --bg-inset: #fafafa;
      --text: #1a1a1a;
      --text-muted: #666;
      --text-dim: #999;
      --border: #e0e0e0;
      --border-subtle: #f0f0f0;
      --input-bg: #fff;
      --input-border: #d0d0d0;
      --input-focus: #666;
      --btn-bg: #1a1a1a;
      --btn-text: #fff;
      --chip-bg: #fff;
      --chip-border: #e0e0e0;
      --chip-text: #666;
      --chip-hover-border: #999;
      --chip-hover-text: #333;
    }

    [data-theme="dark"] {
      --bg: #1a1a1a;
      --bg-surface: #242424;
      --bg-inset: #1e1e1e;
      --text: #e0e0e0;
      --text-muted: #aaa;
      --text-dim: #999;
      --border: #333;
      --border-subtle: #2e2e2e;
      --input-bg: #2a2a2a;
      --input-border: #444;
      --input-focus: #888;
      --btn-bg: #e0e0e0;
      --btn-text: #1a1a1a;
      --chip-bg: #2a2a2a;
      --chip-border: #3a3a3a;
      --chip-text: #aaa;
      --chip-hover-border: #666;
      --chip-hover-text: #ccc;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 24px 32px 16px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    header p {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .theme-toggle:hover {
      border-color: var(--text-dim);
      color: var(--text);
    }

    .input-area {
      padding: 16px 32px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      background: var(--input-bg);
      color: var(--text);
    }

    .input-area input:focus {
      border-color: var(--input-focus);
    }

    .input-area button {
      padding: 10px 20px;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .input-area button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .suggestions {
      padding: 12px 32px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .suggestion {
      padding: 6px 12px;
      background: var(--chip-bg);
      border: 1px solid var(--chip-border);
      border-radius: 16px;
      font-size: 0.8rem;
      color: var(--chip-text);
      cursor: pointer;
    }

    .suggestion:hover {
      border-color: var(--chip-hover-border);
      color: var(--chip-hover-text);
    }

    .results {
      flex: 1;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 700px;
    }

    .result-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .result-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .result-title {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .result-reasoning {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-style: italic;
    }

    .result-body {
      padding: 16px;
    }

    .result-question {
      font-size: 0.8rem;
      color: var(--text-dim);
      padding: 8px 16px;
      background: var(--bg-inset);
      border-bottom: 1px solid var(--border-subtle);
    }

    .status {
      padding: 16px 32px;
      font-size: 0.85rem;
      color: var(--text-dim);
      display: none;
    }

    .status.visible {
      display: block;
    }

    .empty {
      padding: 64px 32px;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Experiment 3: Generative Visuals</h1>
      <p>Can the AI generate a usable visual from scratch, with no component library?</p>
    </div>
    <button class="theme-toggle" id="themeToggle">Light mode</button>
  </header>

  <div class="input-area">
    <input type="text" id="question" placeholder="Ask a question about the organization..." />
    <button id="go">Generate</button>
  </div>

  <div class="suggestions">
    <button class="suggestion" data-q="Tell me about Raj Patel">Tell me about Raj Patel</button>
    <button class="suggestion" data-q="What happens if Raj Patel resigns?">What if Raj Patel resigns?</button>
    <button class="suggestion" data-q="Show me the Platform team">Platform team</button>
    <button class="suggestion" data-q="Who has the most direct reports?">Most direct reports</button>
    <button class="suggestion" data-q="Compare the Engineering and Sales departments by headcount and tenure">Engineering vs Sales</button>
    <button class="suggestion" data-q="Which skills are only held by one or two people?">Rare skills</button>
  </div>

  <div class="status" id="status"></div>

  <div class="results" id="results">
    <div class="empty" id="empty">Ask a question and the AI will generate a visual from scratch.</div>
  </div>

  <script>
    const input = document.getElementById('question');
    const goBtn = document.getElementById('go');
    const status = document.getElementById('status');
    const results = document.getElementById('results');
    const empty = document.getElementById('empty');
    const themeToggle = document.getElementById('themeToggle');

    // Theme
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateToggleLabel();

    function updateToggleLabel() {
      const current = document.documentElement.getAttribute('data-theme');
      themeToggle.textContent = current === 'dark' ? 'Light mode' : 'Dark mode';
    }

    function getTheme() {
      return document.documentElement.getAttribute('data-theme');
    }

    themeToggle.addEventListener('click', () => {
      const next = getTheme() === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateToggleLabel();
    });

    let generating = false;

    function showStatus(msg) {
      status.textContent = msg;
      status.classList.add('visible');
    }

    function hideStatus() {
      status.classList.remove('visible');
    }

    async function generate(question) {
      if (generating || !question.trim()) return;
      generating = true;
      goBtn.disabled = true;
      empty.style.display = 'none';

      const theme = getTheme();
      const eventSource = new EventSource(`/api/generate?question=${encodeURIComponent(question)}&theme=${theme}`);

      eventSource.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);

          if (data.type === 'status') {
            showStatus(data.message);
          } else if (data.type === 'result') {
            hideStatus();
            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
              <div class="result-question">${question}</div>
              <div class="result-header">
                <span class="result-title">${data.title || 'Generated Visual'}</span>
                <span class="result-reasoning">${data.reasoning || ''}</span>
              </div>
              <div class="result-body">${data.html}</div>
            `;
            results.prepend(card);
          } else if (data.type === 'error') {
            hideStatus();
            showStatus('Error: ' + data.message);
          } else if (data.type === 'done') {
            eventSource.close();
            generating = false;
            goBtn.disabled = false;
            hideStatus();
          }
        } catch (e) {
          console.error('Parse error:', e);
        }
      };

      eventSource.onerror = () => {
        eventSource.close();
        generating = false;
        goBtn.disabled = false;
        hideStatus();
        showStatus('Connection lost. Try again.');
      };
    }

    goBtn.addEventListener('click', () => generate(input.value));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') generate(input.value);
    });

    document.querySelector('.suggestions').addEventListener('click', (e) => {
      const btn = e.target.closest('.suggestion');
      if (btn?.dataset.q) {
        input.value = btn.dataset.q;
        generate(btn.dataset.q);
      }
    });
  </script>
</body>
</html>
